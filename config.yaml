project:
  name: quant-factor-project
  random_seed: 42

data:
  provider: yfinance
  market: us_equity
  universe: manual
  symbols:
    - AAPL
    - MSFT
    - NVDA
    - AMZN
    - GOOGL
    - META
    - JPM
    - XOM
    - UNH
    - PG
    - HD
    - COST
    - AVGO
    - LLY
    - V
    - MA
    - NFLX
    - CRM
    - ORCL
    - KO
  start_date: "2018-01-01"
  end_date: "2023-12-31"
  adjusted_price: auto
  raw_dir: data/raw
  processed_dir: data/processed
  request_timeout: 15
  request_retries: 3
  request_sleep_seconds: 0.5

filters:
  min_listing_days: 252
  exclude_st: true
  exclude_suspended: true

factors:
  momentum_window: 20
  reversal_window: 5
  volatility_window: 20
  moving_average_window: 20
  winsorize_method: mad
  winsorize_limit: 3.0
  standardize: true

evaluation:
  forward_return_days: 1
  ic_method: spearman
  quantile_groups: 5

backtest:
  factor: momentum
  rebalance_frequency: monthly
  portfolio_quantile: 0.2
  weighting: equal
  initial_cash: 1000000
  buy_commission_rate: 0.0003
  sell_commission_rate: 0.0003
  stamp_tax_rate: 0.0
  slippage_rate: 0.001
  benchmark: SPY

output:
  results_dir: results
  figures_dir: results/figures
  reports_dir: results/reports
